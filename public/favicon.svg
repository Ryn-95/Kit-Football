<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="kitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#kitGradient)" stroke="#CCFF00" stroke-width="2"/>
  
  <!-- Football/Soccer ball pattern -->
  <g transform="translate(16, 16)">
    <!-- Pentagon center -->
    <path d="M 0,-8 L 6,-2.5 L 3.7,6.5 L -3.7,6.5 L -6,-2.5 Z" 
          fill="#CCFF00" stroke="#000" stroke-width="0.5"/>
    
    <!-- Hexagons around -->
    <path d="M 0,-8 L 6,-2.5 L 3.7,6.5 L -3.7,6.5 L -6,-2.5 Z" 
          fill="none" stroke="#CCFF00" stroke-width="1.5"/>
    
    <!-- KF text -->
    <text x="0" y="2" font-family="Arial Black, sans-serif" font-size="8" 
          font-weight="900" text-anchor="middle" fill="#000">KF</text>
  </g>
  
  <!-- Small accent dots -->
  <circle cx="8" cy="8" r="1" fill="#CCFF00" opacity="0.8"/>
  <circle cx="24" cy="8" r="1" fill="#CCFF00" opacity="0.8"/>
  <circle cx="8" cy="24" r="1" fill="#CCFF00" opacity="0.8"/>
  <circle cx="24" cy="24" r="1" fill="#CCFF00" opacity="0.8"/>
</svg>
